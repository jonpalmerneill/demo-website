<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="What we make real — Carnevale design & development agency" />
  <title>What we make real — Carnevale</title>
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- Set page state before first paint -->
  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.dataset.theme = 'light';
    }
    if (localStorage.getItem('less-motion') === 'on') {
      document.documentElement.classList.add('is-less-motion');
    }
    document.documentElement.classList.add('is-entering');
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
    rel="stylesheet"
  />

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/cursor.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/services.css" />
</head>
<body>

  <!-- Back to gallery -->
  <a href="index.html" class="project-back" aria-label="Back to gallery">
    <svg viewBox="0 0 22 10" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
      <line x1="20" y1="5" x2="2" y2="5" stroke-linecap="round" />
      <polyline points="7,1 2,5 7,9" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <span>Back</span>
  </a>

  <!-- Nav — C logo + full-screen menu -->
  <button id="nav-logo" aria-label="Open navigation" aria-expanded="false">
    <img src="favicon.png" alt="Carnevale" aria-hidden="true" />
    <svg class="nav-logo__close" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <line x1="5" y1="5" x2="15" y2="15" stroke-linecap="round"/>
      <line x1="15" y1="5" x2="5" y2="15" stroke-linecap="round"/>
    </svg>
  </button>

  <nav id="nav-menu" aria-label="Site navigation">
    <ul class="nav__items">
      <li><a class="nav__item" href="index.html">Work</a></li>
      <li><a class="nav__item" href="#">Studio</a></li>
      <li><a class="nav__item" href="#">Services</a></li>
      <li><a class="nav__item" href="contact.html">Contact</a></li>
    </ul>
    <div class="nav__footer">
      <div class="nav__footer-links">
        <a class="nav__footer-link" href="#">Instagram</a>
        <a class="nav__footer-link" href="#">LinkedIn</a>
        <a class="nav__footer-link" href="#">&copy; 2025 Carnevale</a>
      </div>
      <div class="nav__footer-controls">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle colour scheme">
          <span class="theme-toggle__track">
            <span class="theme-toggle__thumb"></span>
          </span>
          <span class="theme-toggle__label">Dark Mode</span>
        </button>
        <label class="less-motion-toggle" for="less-motion-checkbox">
          <input type="checkbox" id="less-motion-checkbox" class="less-motion-toggle__input" />
          <span class="less-motion-toggle__box"></span>
          <span class="less-motion-toggle__label">Less Motion</span>
        </label>
      </div>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════════════════════════
       Services page
  ════════════════════════════════════════════════════════════════ -->
  <main class="services">
    <div class="services__scene">

      <p
        class="services__statement"
        aria-label="We turn ambitious ideas into real-world digital experiences through technology, design, and software development. What mediums or services are you most interested in?"
      ></p>

      <div class="services__pills" aria-hidden="true">
        <button class="services__pill" type="button" data-service="strategy">Strategy</button>
        <button class="services__pill" type="button" data-service="web-experience">Web Experience</button>
        <button class="services__pill" type="button" data-service="enterprise-software">Enterprise Software</button>
        <button class="services__pill" type="button" data-service="extended-reality">Extended Reality</button>
        <button class="services__pill" type="button" data-service="physical-exhibits">Physical Exhibits</button>
        <button class="services__pill" type="button" data-service="iot">IoT</button>
        <button class="services__pill" type="button" data-service="digital-accessibility">Digital Accessibility</button>
        <button class="services__pill" type="button" data-service="mobile-apps">Mobile Apps</button>
        <button class="services__pill" type="button" data-service="customer-research">Customer Research</button>
      </div>

      <div class="services__actions" aria-hidden="true">
        <button id="services-mic" type="button" class="services__mic" aria-label="Voice input">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <rect x="7" y="1" width="6" height="10" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M4,10 Q10,16 16,10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="10" y1="16" x2="10" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="7" y1="19" x2="13" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <a href="index.html" class="services__skip">Skip</a>
      </div>

    </div>
  </main>

  <script type="module" src="js/services.js"></script>

</body>
</html>
