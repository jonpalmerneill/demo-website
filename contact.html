<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Get in touch with Carnevale — design & development agency" />
  <title>Contact — Carnevale</title>
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- Set page state before first paint -->
  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.dataset.theme = 'light';
    }
    if (localStorage.getItem('less-motion') === 'on') {
      document.documentElement.classList.add('is-less-motion');
    }
    document.documentElement.classList.add('is-entering');
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
    rel="stylesheet"
  />

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/contact.css" />
</head>
<body>

  <!-- Back to gallery -->
  <a href="index.html" class="project-back" aria-label="Back to gallery">
    <svg viewBox="0 0 22 10" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
      <line x1="20" y1="5" x2="2" y2="5" stroke-linecap="round" />
      <polyline points="7,1 2,5 7,9" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <span>Back</span>
  </a>

  <!-- Nav — C logo + full-screen menu -->
  <button id="nav-logo" aria-label="Open navigation" aria-expanded="false">
    <img src="favicon.png" alt="Carnevale" aria-hidden="true" />
    <svg class="nav-logo__close" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <line x1="5" y1="5" x2="15" y2="15" stroke-linecap="round"/>
      <line x1="15" y1="5" x2="5" y2="15" stroke-linecap="round"/>
    </svg>
  </button>

  <nav id="nav-menu" aria-label="Site navigation">
    <ul class="nav__items">
      <li><a class="nav__item" href="index.html">Work</a></li>
      <li><a class="nav__item" href="#">Studio</a></li>
      <li><a class="nav__item" href="#">Services</a></li>
      <li><a class="nav__item" href="contact.html">Contact</a></li>
    </ul>
    <div class="nav__footer">
      <div class="nav__footer-links">
        <a class="nav__footer-link" href="#">Instagram</a>
        <a class="nav__footer-link" href="#">LinkedIn</a>
        <a class="nav__footer-link" href="#">&copy; 2025 Carnevale</a>
      </div>
      <div class="nav__footer-controls">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle colour scheme">
          <span class="theme-toggle__track">
            <span class="theme-toggle__thumb"></span>
          </span>
          <span class="theme-toggle__label">Dark Mode</span>
        </button>
        <label class="less-motion-toggle" for="less-motion-checkbox">
          <input type="checkbox" id="less-motion-checkbox" class="less-motion-toggle__input" />
          <span class="less-motion-toggle__box"></span>
          <span class="less-motion-toggle__label">Less Motion</span>
        </label>
      </div>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════════════════════════
       Contact page
  ════════════════════════════════════════════════════════════════ -->
  <main class="contact">

    <!-- ── Hero: typewriter + action buttons ── -->
    <div class="contact__hero">
      <div class="contact__scene">

        <p
          class="contact__prompt"
          aria-label="Hey, we're ready to connect in a number of ways. What works best for you?"
        ></p>

        <div class="contact__actions" aria-hidden="true">
          <a href="#" class="contact__btn">
            <span class="contact__btn-num" aria-hidden="true">01</span>
            <span class="contact__btn-label">Send a quick message</span>
            <span class="contact__btn-arrow" aria-hidden="true">→</span>
          </a>
          <a href="#" class="contact__btn">
            <span class="contact__btn-num" aria-hidden="true">02</span>
            <span class="contact__btn-label">Schedule a video chat with Mike</span>
            <span class="contact__btn-arrow" aria-hidden="true">→</span>
          </a>
          <a href="#" class="contact__btn">
            <span class="contact__btn-num" aria-hidden="true">03</span>
            <span class="contact__btn-label">Request a quote</span>
            <span class="contact__btn-arrow" aria-hidden="true">→</span>
          </a>
          <a href="#" class="contact__btn">
            <span class="contact__btn-num" aria-hidden="true">04</span>
            <span class="contact__btn-label">Plan a free, in-person consultation meeting</span>
            <span class="contact__btn-arrow" aria-hidden="true">→</span>
          </a>
          <a href="#" class="contact__btn">
            <span class="contact__btn-num" aria-hidden="true">05</span>
            <span class="contact__btn-label">Show me FAQs</span>
            <span class="contact__btn-arrow" aria-hidden="true">→</span>
          </a>
        </div>

      </div>
    </div>

  </main>

  <script type="module" src="js/contact.js"></script>

</body>
</html>
